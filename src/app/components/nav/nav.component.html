<nav
  class="fixed top-0 w-full z-50 transition-all duration-300 tonal-shift-via-opacity backdrop-blur-md"
  [ngClass]="{
    'bg-white': isScrolled,
    'bg-white/70': !isScrolled
  }"
>
  <div class="flex justify-between items-center px-8 py-4 max-w-7xl mx-auto">
    <div
      class="flex items-center gap-3 cursor-pointer"
      (click)="scrollTo('accueil')"
    >
      <img
        src="assets/logo.jpg"
        alt="The Nails Manicure & pédicure"
        class="w-12 h-12 rounded-full object-cover shadow-sm"
      />

      <span class="text-2xl font-bold text-primary tracking-tighter font-headline">
        The Nails
      </span>
    </div>

    <div class="hidden md:flex gap-8 items-center">
      <ng-container *ngFor="let link of navLinks">
        <a
          class="font-headline text-sm uppercase tracking-widest cursor-pointer transition-all duration-200 pb-1"
          [ngClass]="{
            'text-primary border-b-2 border-primary font-bold': activeSection === link.id,
            'text-zinc-500 hover:text-primary font-medium': activeSection !== link.id
          }"
          (click)="scrollTo(link.id)"
        >
          {{ link.label }}
        </a>
      </ng-container>
    </div>

    <button
      (click)="scrollTo('contact')"
      class="bg-tertiary-container text-on-tertiary-container px-6 py-2.5 rounded-full font-headline font-bold text-sm uppercase tracking-widest hover:scale-105 transition-all duration-300 shadow-sm active:scale-95"
    >
      Réserver
    </button>
  </div>
</nav>
